name: Stock Breakout Scanner

on:
  # 毎日の定期実行設定 (UTC時間のため、日本時間から9時間引いた時間を指定します)
  schedule:
    - cron: '30 22 * * 1-5'  # 日本時間：月〜金の朝 07:30 に実行
    - cron: '10 7 * * 1-5'   # 日本時間：月〜金の夕方 16:10 に実行
  # ボタンを押して手動でいつでも動かせるようにする設定
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    # 1. リポジトリのコードをGitHubの仮想サーバーに持ってくる
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 仮想サーバーにPython環境をセットアップする
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 必要なライブラリ（yfinance等）を一括インストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. 朝の全銘柄スキャンを実行（日本時間07:30のトリガー時、または手動実行時に動く）
    - name: Run Morning Scan
      if: github.event.schedule == '30 22 * * 1-5' || github.event_name == 'workflow_dispatch'
      env:
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python breakout.py

    # 5. 夕方の株ミニスキャンを実行（日本時間16:10のトリガー時のみ動く）
    - name: Run Evening Scan
      if: github.event.schedule == '10 7 * * 1-5'
      env:
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python breakout_mini.py
